<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB Designer - Візуальний конструктор баз даних</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <ellipse cx="12" cy="5" rx="9" ry="3"/>
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                </svg>
                <span>DB Designer</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="saveToLocalStorage()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    Зберегти
                </button>
                <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    Імпорт
                </button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importFromFile(event)">
                <div class="export-dropdown">
                    <button class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                        </svg>
                        Експорт
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                    </button>
                    <div class="dropdown-menu">
                        <a href="/api/export/sql" class="dropdown-item">
                            <span class="badge sqlite">SQLite</span>
                            schema.sql
                        </a>
                        <a href="/api/export/mysql" class="dropdown-item">
                            <span class="badge mysql">MySQL</span>
                            schema.sql
                        </a>
                        <a href="/api/export/postgresql" class="dropdown-item">
                            <span class="badge postgresql">PostgreSQL</span>
                            schema.sql
                        </a>
                        <a href="/api/export/json" class="dropdown-item">
                            <span class="badge json">JSON</span>
                            schema.json
                        </a>
                    </div>
                </div>
                <button class="btn btn-secondary" onclick="clearAll()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                    Очистити
                </button>
                
                <!-- User Menu -->
                <div class="user-menu" id="userMenu">
                    <button class="btn btn-icon" onclick="toggleUserMenu()" id="userMenuBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </button>
                    <div class="user-dropdown" id="userDropdown">
                        <div class="user-info" id="userInfo" style="display:none">
                            <img id="userAvatar" src="" alt="Avatar" class="user-avatar">
                            <div>
                                <div class="user-name" id="userName"></div>
                                <div class="user-id" id="userId"></div>
                            </div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <button class="dropdown-item" onclick="openProfile()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            Профіль
                        </button>
                        <button class="dropdown-item" onclick="openSettings()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
                            </svg>
                            Налаштування
                        </button>
                        <div class="dropdown-divider"></div>
                        <button class="dropdown-item logout" onclick="logout()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                                <polyline points="16 17 21 12 16 7"/>
                                <line x1="21" y1="12" x2="9" y2="12"/>
                            </svg>
                            Вийти
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Tabs Bar -->
        <div class="tabs-bar">
            <div class="tabs-list" id="tabsList">
                <!-- Tabs will be rendered here -->
            </div>
            <button class="add-tab-btn" onclick="addTable()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Нова таблиця
            </button>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Toolbar -->
            <div class="toolbar">
                <button class="tool-btn" onclick="addColumn()" title="Додати стовпець">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="12" y1="8" x2="12" y2="16"/>
                        <line x1="8" y1="12" x2="16" y2="12"/>
                    </svg>
                    Додати стовпець
                </button>
                <button class="tool-btn" onclick="addRow()" title="Додати рядок">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="8" y1="12" x2="16" y2="12"/>
                    </svg>
                    Додати рядок
                </button>
                <div class="toolbar-divider"></div>
                <button class="tool-btn danger" onclick="deleteColumn()" title="Видалити стовпець">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="8" y1="12" x2="16" y2="12"/>
                    </svg>
                    Видалити стовпець
                </button>
                <button class="tool-btn danger" onclick="deleteRow()" title="Видалити рядок">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="12" y1="8" x2="12" y2="16"/>
                    </svg>
                    Видалити рядок
                </button>
                <div class="toolbar-spacer"></div>
                <div class="table-name-input">
                    <label>Таблиця:</label>
                    <input type="text" id="currentTableName" placeholder="Назва таблиці" onchange="updateTableName(this.value)">
                </div>
            </div>

            <!-- Spreadsheet -->
            <div class="spreadsheet-container">
                <div class="spreadsheet" id="spreadsheet">
                    <table id="dataTable">
                        <thead id="tableHead">
                            <!-- Header will be rendered here -->
                        </thead>
                        <tbody id="tableBody">
                            <!-- Rows will be rendered here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Status Bar -->
            <div class="status-bar">
                <div class="status-left">
                    <span id="statusInfo">Готово</span>
                </div>
                <div class="status-right">
                    <span>Стовпців: <strong id="colCount">0</strong></span>
                    <span>Рядків: <strong id="rowCount">0</strong></span>
                </div>
            </div>
        </main>
    </div>

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-overlay" onclick="closeAuthModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="authTitle">Увійти</h2>
                <button class="modal-close" onclick="closeAuthModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchAuthTab('login')">Увійти</button>
                    <button class="auth-tab" onclick="switchAuthTab('register')">Реєстрація</button>
                </div>
                
                <!-- Login Form -->
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label>Ім'я користувача</label>
                        <input type="text" id="loginUsername" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Увійти</button>
                </form>
                
                <!-- Register Form -->
                <form id="registerForm" class="auth-form" style="display:none">
                    <div class="form-group">
                        <label>Ім'я користувача</label>
                        <input type="text" id="registerUsername" required>
                    </div>
                    <div class="form-group">
                        <label>Email (для сповіщень)</label>
                        <input type="email" id="registerEmail">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="registerPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Зареєструватися</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div class="modal" id="profileModal">
        <div class="modal-overlay" onclick="closeProfileModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Профіль</h2>
                <button class="modal-close" onclick="closeProfileModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="profile-section">
                    <div class="avatar-upload">
                        <img id="profileAvatar" src="" alt="Avatar" class="profile-avatar">
                        <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(event)">
                        <button class="btn btn-secondary" onclick="document.getElementById('avatarInput').click()">Змінити аватар</button>
                    </div>
                    <div class="form-group">
                        <label>Ім'я користувача</label>
                        <input type="text" id="profileUsername" readonly>
                    </div>
                    <div class="form-group">
                        <label>ID користувача</label>
                        <input type="text" id="profileId" readonly>
                    </div>
                    <div class="form-group">
                        <label>Email (для сповіщень про оновлення)</label>
                        <input type="email" id="profileEmail">
                    </div>
                    <button class="btn btn-primary" onclick="saveProfile()">Зберегти зміни</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-overlay" onclick="closeSettingsModal()"></div>
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>Налаштування</h2>
                <button class="modal-close" onclick="closeSettingsModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="settings-tabs">
                    <button class="settings-tab active" onclick="switchSettingsTab('personalization')">Персоналізація</button>
                    <button class="settings-tab" onclick="switchSettingsTab('notifications')">Сповіщення</button>
                </div>
                
                <!-- Personalization Tab -->
                <div class="settings-content" id="personalizationTab">
                    <div class="settings-section">
                        <h3>Тема інтерфейсу</h3>
                        <div class="themes-grid" id="themesGrid">
                            <!-- Themes will be rendered here -->
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3>Шрифт</h3>
                        <div class="fonts-grid" id="fontsGrid">
                            <!-- Fonts will be rendered here -->
                        </div>
                    </div>
                </div>
                
                <!-- Notifications Tab -->
                <div class="settings-content" id="notificationsTab" style="display:none">
                    <div class="settings-section">
                        <h3>Сповіщення</h3>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="emailNotifications" checked>
                                Отримувати сповіщення про оновлення на email
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
