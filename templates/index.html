<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB Designer - Візуальний конструктор баз даних</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <ellipse cx="12" cy="5" rx="9" ry="3"/>
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                </svg>
                <span>DB Designer</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="saveToLocalStorage()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    Зберегти
                </button>
                <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    Імпорт
                </button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importFromFile(event)">
                <button class="btn btn-secondary" onclick="clearAll()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                    Очистити
                </button>
                <div class="export-dropdown">
                    <button class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                        </svg>
                        Експорт
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                    </button>
                    <div class="dropdown-menu">
                        <a href="/api/export/sql" class="dropdown-item">
                            <span class="badge sqlite">SQLite</span>
                            schema.sql
                        </a>
                        <a href="/api/export/mysql" class="dropdown-item">
                            <span class="badge mysql">MySQL</span>
                            schema.sql
                        </a>
                        <a href="/api/export/postgresql" class="dropdown-item">
                            <span class="badge postgresql">PostgreSQL</span>
                            schema.sql
                        </a>
                        <a href="/api/export/json" class="dropdown-item">
                            <span class="badge json">JSON</span>
                            schema.json
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Tabs Bar -->
        <div class="tabs-bar">
            <div class="tabs-list" id="tabsList">
                <!-- Tabs will be rendered here -->
            </div>
            <button class="add-tab-btn" onclick="addTable()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Нова таблиця
            </button>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Toolbar -->
            <div class="toolbar">
                <button class="tool-btn" onclick="addColumn()" title="Додати стовпець">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="12" y1="8" x2="12" y2="16"/>
                        <line x1="8" y1="12" x2="16" y2="12"/>
                    </svg>
                    Додати стовпець
                </button>
                <button class="tool-btn" onclick="addRow()" title="Додати рядок">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="8" y1="12" x2="16" y2="12"/>
                    </svg>
                    Додати рядок
                </button>
                <div class="toolbar-divider"></div>
                <button class="tool-btn danger" onclick="deleteColumn()" title="Видалити стовпець">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="8" y1="12" x2="16" y2="12"/>
                    </svg>
                    Видалити стовпець
                </button>
                <button class="tool-btn danger" onclick="deleteRow()" title="Видалити рядок">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="12" y1="8" x2="12" y2="16"/>
                    </svg>
                    Видалити рядок
                </button>
                <div class="toolbar-spacer"></div>
                <div class="table-name-input">
                    <label>Таблиця:</label>
                    <input type="text" id="currentTableName" placeholder="Назва таблиці" onchange="updateTableName(this.value)">
                </div>
            </div>

            <!-- Spreadsheet -->
            <div class="spreadsheet-container">
                <div class="spreadsheet" id="spreadsheet">
                    <table id="dataTable">
                        <thead id="tableHead">
                            <!-- Header will be rendered here -->
                        </thead>
                        <tbody id="tableBody">
                            <!-- Rows will be rendered here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Status Bar -->
            <div class="status-bar">
                <div class="status-left">
                    <span id="statusInfo">Готово</span>
                </div>
                <div class="status-right">
                    <span>Стовпців: <strong id="colCount">0</strong></span>
                    <span>Рядків: <strong id="rowCount">0</strong></span>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
